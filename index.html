      "Facilita coordinación, máx 2 oraciones. Responde en español.";
    var hist=(state.messages[ck]||[]).filter(function(m){return m.from!=="system";}).slice(-5,-1).map(function(m){
      var isHuman=m.from==="boss"||typeof m.from==="number";
      return{role:isHuman?"user":"assistant",content:m.text.slice(0,200)};
    });
    var clean=[];for(var i=0;i<hist.length;i++){if(clean.length===0||hist[i].role!==clean[clean.length-1].role)clean.push(hist[i]);}
    var prev=clean.concat([{role:"user",content:"["+senderName+"]: "+text}]);
    fetch("/.netlify/functions/claude",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:300,system:sys,messages:prev})
    }).then(function(r){var ct=r.headers.get("content-type")||"";if(!ct.includes("json"))throw new Error("Servidor no disponible ("+r.status+").");return r.json();}).then(function(d){
      var txt=d.error?(d.error.type==="rate_limit_error"?"⏳ Mucho tráfico en este momento. Espera 1 minuto e intenta de nuevo.":"⚠️ "+d.error.message):(d.content&&d.content[0]&&d.content[0].text)||"Sin respuesta.";
      state.messages[ck].push({id:Date.now(),from:"ai",text:txt,ts:Date.now()});
      aiLoading=false;saveLocal();renderChat();
    }).catch(function(e){
      state.messages[ck].push({id:Date.now(),from:"ai",text:"⚠️ Error: "+(e&&e.message||"Sin red"),ts:Date.now()});
      aiLoading=false;saveLocal();renderChat();
    });

  }

  var cc=currentChatCollab||(isBoss?null:currentUser);
  if(!cc)return;

  if(!state.messages[ck])state.messages[ck]=[];

    "TAREAS de "+cc.name+":\n"+taskDetail+"\n"+totales+"\n"+
    "LÍMITES ESTRICTOS: 1) NO puedes ver imágenes adjuntas. 2) NO puedes ejecutar validaciones, cambiar estados de tareas ni actualizar datos — AgendaTeam lo hace automáticamente. 3) NUNCA le pidas a Manuel que suba fotos o evidencias — él es el jefe, no el colaborador. 4) NUNCA le pidas al colaborador que comparta archivos por este chat — debe usar el botón de reportar en la tarea. 5) NUNCA inventes resultados de validación ni confirmes aprobaciones que no aparecen en el historial. 6) Basa tus respuestas SOLO en el historial de chat y los datos de tareas de arriba.\n"+
    "Responde en español. Preguntas simples: máx 3 oraciones. Si piden reporte: usa SOLO datos visibles en el historial; si no los tienes, dilo claramente.";

  // Historial de chat compacto (últimos 6 mensajes)
  var allHist=(state.messages[ck]||[]).filter(function(m){return m.from!=="system";}).slice(-7,-1).map(function(m){
    var isHuman=m.from==="boss"||typeof m.from==="number";
    var name=m.from==="boss"?"Manuel":cc.name;
    return{role:isHuman?"user":"assistant",content:isHuman?"["+name+"]: "+m.text.slice(0,300):m.text.slice(0,300)};

  var prev=clean.concat([{role:"user",content:(isBoss?"[Manuel]: ":"["+cc.name+"]: ")+text}]);
  fetch("/.netlify/functions/claude",{method:"POST",headers:{"Content-Type":"application/json"},

  }).then(function(r){var ct=r.headers.get("content-type")||"";if(!ct.includes("json"))throw new Error("Servidor no disponible ("+r.status+").");return r.json();}).then(function(d){
    var txt=d.error?(d.error.type==="rate_limit_error"?"⏳ Mucho tráfico ahora. Espera 1 minuto e intenta de nuevo.":"⚠️ "+d.error.message):(d.content&&d.content[0]&&d.content[0].text)||"Sin respuesta.";
    state.messages[ck].push({id:Date.now(),from:"ai",text:txt,ts:Date.now()});
    aiLoading=false;saveLocal();renderChat();
  }).catch(function(e){
    state.messages[ck].push({id:Date.now(),from:"ai",text:"⚠️ Error de conexión: "+(e&&e.message||"Sin red"),ts:Date.now()});
    aiLoading=false;saveLocal();renderChat();
  });
}

// ── SHEET ──
function showSheet(title,body){
  closeSheet();
  var ov=document.createElement("div");ov.className="sheet-overlay";
  ov.onclick=function(e){if(e.target===ov)closeSheet();};
  var sh=document.createElement("div");sh.className="sheet";
  sh.innerHTML='<div class="sheet-handle"></div><div class="sheet-head"><h3>'+escH(title)+'</h3><button class="sheet-close" onclick="closeSheet()">✕</button></div><div class="sheet-body" id="sheet-body">'+body+'</div>';
  document.body.appendChild(ov);document.body.appendChild(sh);
  activeSheet={ov:ov,sh:sh};
}
function updateSheetBody(html){var b=document.getElementById("sheet-body");if(b)b.innerHTML=html;}
function closeSheet(){
  if(activeSheet){
    try{document.body.removeChild(activeSheet.ov);}catch(e){}
    try{document.body.removeChild(activeSheet.sh);}catch(e){}
    activeSheet=null;
  }
}

window.addEventListener("load",init);
</script>
