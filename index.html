<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:'Sora',sans-serif;font-size:15px;color:#1a1d2e;background:#eef0f7;overflow:hidden;}
input,select,textarea,button{font-family:inherit;font-size:15px;}
input,select,textarea{-webkit-appearance:none;appearance:none;}
.scroll{overflow-y:auto;-webkit-overflow-scrolling:touch;}
::-webkit-scrollbar{display:none;}
#app{height:100%;display:flex;flex-direction:column;}
.hidden{display:none!important;}

/* ── HEADER ── */
#header{background:linear-gradient(135deg,#1a1d2e 0%,#2d3561 100%);color:#fff;height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;flex-shrink:0;box-shadow:0 2px 12px rgba(26,29,46,.35);}
.logo{font-weight:800;font-size:18px;display:flex;align-items:center;gap:9px;letter-spacing:-.3px;}
.logo-dot{width:9px;height:9px;border-radius:50%;background:#27ae60;box-shadow:0 0 8px rgba(39,174,96,.7);}

/* ── TABS ── */
#tabs{background:#fff;border-bottom:1px solid #e8eaf0;display:flex;flex-shrink:0;padding:0 8px;gap:4px;}
.tab-btn{flex:1;padding:13px 4px;background:none;border:none;cursor:pointer;font-weight:700;font-size:13px;color:#b0b4c8;border-bottom:3px solid transparent;transition:color .2s,border-color .2s;letter-spacing:-.1px;}
.tab-btn.active{color:#1a1d2e;border-bottom-color:#4a6cf7;}

/* ── STAT CARDS ── */
#stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px 12px 0;flex-shrink:0;}
.stat-card{background:#fff;border-radius:14px;padding:11px 6px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.07);}
.stat-num{font-weight:800;font-size:21px;line-height:1;}
.stat-lbl{font-size:10px;color:#aaa;margin-top:3px;font-weight:600;}

/* ── CONTENT & CARDS ── */
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px;}
.card{background:#fff;border-radius:16px;padding:16px 18px;margin-bottom:12px;box-shadow:0 2px 10px rgba(0,0,0,.07);}

/* ── BUTTONS ── */
.btn{border:none;border-radius:12px;padding:12px 18px;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;transition:opacity .15s,transform .1s;}
.btn:active{opacity:.85;transform:scale(.98);}
.btn-dark{background:linear-gradient(135deg,#1a1d2e,#2d3561);color:#fff;}
.btn-blue{background:linear-gradient(135deg,#4a6cf7,#5a8fe0);color:#fff;}
.btn-gray{background:#f0f2f7;color:#555;}
.btn-red{background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff;}
.btn-sm{padding:8px 14px;font-size:13px;border-radius:10px;}
.btn-block{width:100%;padding:14px;}

/* ── FORM FIELDS ── */
.field{margin-bottom:14px;}
.field label{display:block;font-weight:700;font-size:12px;color:#7a7f99;margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px;}
.field input,.field select,.field textarea{width:100%;padding:13px 14px;border-radius:12px;border:1.5px solid #e5e7ef;font-size:15px;outline:none;background:#fff;font-family:inherit;transition:border-color .2s;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:#4a6cf7;}
.field textarea{resize:vertical;min-height:70px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* ── AVATAR ── */
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0;overflow:hidden;}

/* ── TASK ITEMS ── */
.task-item{background:#fff;border:1.5px solid #eef0f6;border-radius:16px;padding:15px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,.05);transition:box-shadow .2s;}
.task-item.overdue{border-color:#ffc8c8;background:linear-gradient(135deg,#fff 80%,#fff5f5);}
.task-item.done{opacity:.72;border-color:#d0eedd;background:linear-gradient(135deg,#fff 80%,#f5fff8);}

/* ── CHECKBOXES / RADIOS ── */
.ck-box{width:22px;height:22px;border-radius:6px;border:2px solid #d0d3e0;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.ck-box.on{background:linear-gradient(135deg,#1a1d2e,#2d3561);border-color:#1a1d2e;color:#fff;}
.ck-radio{width:22px;height:22px;border-radius:50%;border:2px solid #d0d3e0;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.ck-radio.on{border-color:#4a6cf7;}
.ck-radio.on::after{content:'';width:12px;height:12px;border-radius:50%;background:#4a6cf7;display:block;}
.ck-label{display:flex;align-items:center;gap:10px;padding:11px 13px;background:#f7f8fc;border-radius:12px;cursor:pointer;margin-bottom:6px;transition:background .15s;}
.ck-label.on{background:#eef2ff;}

/* ── TASK TYPOGRAPHY ── */
.task-title{font-weight:700;font-size:15px;margin-bottom:8px;line-height:1.3;}
.badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;}
.badge{padding:3px 9px;border-radius:99px;font-size:11px;font-weight:700;}
.task-actions{display:flex;gap:6px;}
.task-act-btn{flex:1;padding:9px 4px;border:none;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .15s;}
.task-act-btn:active{opacity:.8;}

/* ── TIMELINE ── */
.timeline{display:flex;gap:3px;margin-top:10px;align-items:center;}
.tl-dot{width:13px;height:13px;border-radius:50%;flex-shrink:0;cursor:default;position:relative;}
.tl-dot.green{background:#27ae60;}
.tl-dot.yellow{background:#f5a623;}
.tl-dot.red{background:#e74c3c;}
.tl-dot.empty{background:#e0e2ea;}
.tl-label{font-size:10px;color:#aaa;margin-left:4px;}

/* ── PIN PAD ── */
.pin-display{display:flex;gap:12px;justify-content:center;margin:22px 0;}
.pin-dot{width:16px;height:16px;border-radius:50%;background:#e5e7ef;border:2px solid #d0d3e0;transition:all .2s;}
.pin-dot.filled{background:#1a1d2e;border-color:#1a1d2e;transform:scale(1.1);}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:290px;margin:0 auto;}
.pin-btn{background:#fff;border:1.5px solid #e8eaf0;border-radius:16px;padding:18px;font-size:22px;font-weight:700;cursor:pointer;text-align:center;box-shadow:0 2px 6px rgba(0,0,0,.06);transition:all .1s;}
.pin-btn:active{background:#f0f2f7;transform:scale(.95);}
.pin-btn.del{font-size:18px;color:#e74c3c;}

/* ── CHIPS ── */
#collab-chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;}
.chip{display:flex;align-items:center;gap:5px;border:1.5px solid #e8eaf0;border-radius:99px;padding:6px 12px;background:#f7f8fc;white-space:nowrap;font-size:13px;font-weight:600;transition:all .15s;}
.chip.active{background:linear-gradient(135deg,#1a1d2e,#2d3561);color:#fff;border-color:#1a1d2e;}

/* ── SHEET ── */
.sheet-overlay{position:fixed;inset:0;background:rgba(15,18,35,.5);z-index:400;backdrop-filter:blur(2px);}
.sheet{position:fixed;left:0;right:0;bottom:0;background:#fff;border-radius:24px 24px 0 0;z-index:401;max-height:93vh;display:flex;flex-direction:column;box-shadow:0 -4px 30px rgba(0,0,0,.15);}
.sheet-handle{width:44px;height:4px;background:#dde0ea;border-radius:99px;margin:14px auto 4px;}
.sheet-head{display:flex;justify-content:space-between;align-items:center;padding:8px 20px 14px;}
.sheet-head h3{font-weight:800;font-size:18px;}
.sheet-close{background:#f0f2f7;border:none;border-radius:99px;width:34px;height:34px;font-size:18px;cursor:pointer;color:#777;transition:background .15s;}
.sheet-close:active{background:#e0e2ea;}
.sheet-body{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 20px 48px;}

/* ── TOAST ── */
#toast{position:fixed;bottom:94px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#1a1d2e,#2d3561);color:#fff;padding:12px 24px;border-radius:99px;font-weight:700;font-size:14px;z-index:999;white-space:nowrap;box-shadow:0 6px 24px rgba(0,0,0,.3);display:none;letter-spacing:-.1px;}
#toast.error{background:linear-gradient(135deg,#e74c3c,#c0392b);}

/* ── CONFIRM DIALOG ── */
#confirm-overlay{position:fixed;inset:0;background:rgba(15,18,35,.55);z-index:9000;display:none;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(3px);}
.confirm-box{background:#fff;border-radius:24px;padding:30px 24px;max-width:320px;width:100%;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.2);}

/* ── LOGIN ── */
#login-screen{position:fixed;inset:0;background:linear-gradient(160deg,#1a1d2e 0%,#2d3561 60%,#3d4a8a 100%);display:flex;align-items:center;justify-content:center;padding:24px;overflow-y:auto;z-index:300;}
.login-card{background:#fff;border-radius:28px;padding:34px 22px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.35);}

/* ── PHOTO ── */
.photo-circle{width:90px;height:90px;border-radius:50%;overflow:hidden;border:3px solid #e8eaf0;background:#f0f2f7;display:flex;align-items:center;justify-content:center;font-size:36px;box-shadow:0 2px 12px rgba(0,0,0,.1);}
.photo-circle img{width:100%;height:100%;object-fit:cover;}
.photo-btns{display:flex;gap:10px;width:100%;}
.photo-btn{flex:1;padding:13px 8px;border:none;border-radius:12px;font-weight:700;font-size:14px;cursor:pointer;text-align:center;font-family:inherit;transition:opacity .15s;}
.photo-btn:active{opacity:.8;}

/* ── CHAT ── */
.msg-row{display:flex;gap:8px;margin-bottom:12px;}
.msg-row.me{justify-content:flex-end;}
.msg-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;margin-top:2px;box-shadow:0 1px 4px rgba(0,0,0,.15);}
.msg-bubble{max-width:82%;padding:11px 15px;font-size:14px;line-height:1.6;white-space:pre-wrap;border-radius:4px 18px 18px 18px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.msg-bubble.me{background:linear-gradient(135deg,#1a1d2e,#2d3561);color:#fff;border-radius:18px 4px 18px 18px;}
.msg-bubble.ai,.msg-bubble.other{background:#f0f2f7;color:#1a1d2e;}
.msg-bubble.system{background:#fff8ec;color:#1a1d2e;border-left:3px solid #f5a623;}
.msg-bubble.flag{background:#fff0f0;color:#c0392b;border:1.5px solid #ffcccc;}
.msg-bubble.boss_msg{background:linear-gradient(135deg,#eef0ff,#e8eaf6);color:#1a1d2e;}
.msg-bubble.biometric{background:linear-gradient(135deg,#eafaf1,#d5f5e3);color:#1a1d2e;border-left:3px solid #27ae60;}
.msg-time{font-size:10px;opacity:.45;margin-top:5px;text-align:right;}
.chat-input-row{display:flex;gap:8px;padding-top:10px;border-top:1px solid #eef0f7;flex-shrink:0;}
.chat-input{flex:1;padding:12px 18px;border-radius:99px;border:1.5px solid #e5e7ef;font-size:15px;outline:none;background:#f7f8fc;font-family:inherit;transition:border-color .2s;}
.chat-input:focus{border-color:#4a6cf7;background:#fff;}
.chat-send{background:linear-gradient(135deg,#1a1d2e,#2d3561);color:#fff;border:none;border-radius:50%;width:46px;height:46px;font-size:20px;cursor:pointer;flex-shrink:0;box-shadow:0 2px 8px rgba(26,29,46,.4);transition:transform .1s;}
.chat-send:active{transform:scale(.92);}
</style>
</head>
<body>
<div id="login-screen" class="hidden"></div>
<div id="app" class="hidden">
  <div id="header">
    <div class="logo"><div class="logo-dot"></div>AgendaTeam</div>
    <div style="display:flex;align-items:center;gap:10px;">
      <div id="flag-badge" class="hidden" style="background:#e74c3c;color:#fff;border-radius:99px;padding:3px 10px;font-size:12px;font-weight:700;"></div>
      <button id="notif-btn" onclick="requestNotifPermission()" title="Activar notificaciones" style="background:none;border:none;font-size:20px;cursor:pointer;padding:4px;">🔔</button>
      <div id="user-av" class="hidden"></div>
      <button class="btn btn-sm" style="background:#2d3561;color:#fff;" onclick="logout()">Salir</button>

  <div id="tabs">
    <button class="tab-btn active" onclick="switchTab('tareas')">📋 Tareas</button>

  <div id="stats"></div>

</div>

<div id="confirm-overlay" style="display:none;flex-direction:column;">
  <div class="confirm-box">
    <div style="font-size:36px;margin-bottom:10px">⚠️</div>
    <p id="confirm-msg" style="font-weight:800;font-size:16px;margin-bottom:6px;"></p>
    <p id="confirm-sub" style="font-size:13px;color:#999;margin-bottom:22px;"></p>
    <div style="display:flex;gap:10px;">
      <button id="confirm-ok-btn" class="btn btn-red btn-block" onclick="confirmOk()" style="flex:1">Eliminar</button>
      <button class="btn btn-gray btn-block" onclick="closeConfirm()" style="flex:1">Cancelar</button>
    </div>
  </div>
</div>

try{

var VAPID_KEY="BAmQh9W30ycVNv075wYZKEIArPB7V6r7mLIFRJtaHPn_-7l04BHfhgsKV2OvenT80kbnKED69ow4_7h1eMqG7Fo";
var fcmMessaging=null;
var CLOUDINARY_CLOUD="dzwm1f3o8";
var CLOUDINARY_PRESET="AgendaTeam";
var _evidenceFiles=[];
var _evidenceCoords=[]; // coords paralelas por archivo: {lat,lng,acc} o null

function uploadEvidence(taskId,files,coordsList,onProgress,onDone,onError){
  var urls=[],total=files.length,done=0;
  if(!total){onDone([]);return;}
  Array.from(files).forEach(function(file,idx){
    var fileCoord=(coordsList&&coordsList[idx])||null;
    var isImg=file.type.indexOf("image")>=0||file.type.indexOf("video")>=0;
    var resource=isImg?(file.type.indexOf("video")>=0?"video":"image"):"raw";
    var fd=new FormData();
    fd.append("file",file);
    fd.append("upload_preset",CLOUDINARY_PRESET);
    fd.append("folder","agendateam/evidence/"+taskId);
    var xhr=new XMLHttpRequest();
    xhr.open("POST","https://api.cloudinary.com/v1_1/"+CLOUDINARY_CLOUD+"/"+resource+"/upload");
    xhr.upload.onprogress=function(e){if(e.lengthComputable)onProgress&&onProgress(Math.round(e.loaded/e.total*100));};
    xhr.onload=function(){
      var res=JSON.parse(xhr.responseText);
      if(res.secure_url){
        var att={url:res.secure_url,name:file.name,type:file.type,size:file.size,public_id:res.public_id};
        if(fileCoord)att.coords=fileCoord;
        urls.push(att);
        done++;
        if(done===total)onDone(urls);
      }else{onError(res.error&&res.error.message||"Error Cloudinary");}
    };
    xhr.onerror=function(){onError("Error de red al subir "+file.name);};
    xhr.send(fd);
  });
}

function getFileIcon(type,name){
  if(!type&&name){var ext=(name.split('.').pop()||"").toLowerCase();
    if(["jpg","jpeg","png","gif","webp"].indexOf(ext)>=0)type="image/";
    else if(ext==="pdf")type="application/pdf";
    else if(["xls","xlsx"].indexOf(ext)>=0)type="excel";
    else if(["doc","docx"].indexOf(ext)>=0)type="word";
  }
  if((type||"").indexOf("image")>=0)return"🖼️";
  if((type||"").indexOf("pdf")>=0)return"📄";
  if((type||"").indexOf("excel")>=0||(type||"").indexOf("spreadsheet")>=0)return"📊";
  if((type||"").indexOf("word")>=0||(type||"").indexOf("document")>=0)return"📝";
  if((type||"").indexOf("video")>=0)return"🎥";
  if((type||"").indexOf("audio")>=0)return"🎵";
  return"📎";
}

function initFCM(){
  if(typeof firebase==="undefined"||!db)return;
  if(!("serviceWorker" in navigator)){console.warn("Service Worker no soportado");return;}
  navigator.serviceWorker.register("/firebase-messaging-sw.js").then(function(){
    return navigator.serviceWorker.ready;
  }).then(function(){
    try{
      fcmMessaging=firebase.messaging();
      fcmMessaging.onMessage(function(payload){
        var n=payload.notification||{};
        showPushBanner(n.title||"AgendaTeam",n.body||"");
      });
      console.log("FCM listo");
    }catch(e){console.warn("FCM init:",e);}
  }).catch(function(e){console.warn("SW register:",e);});
}

function showPushBanner(title,body){
  var el=document.createElement("div");
  el.style.cssText="position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#1a1d2e;color:#fff;padding:14px 20px;border-radius:14px;z-index:9999;max-width:320px;box-shadow:0 4px 20px rgba(0,0,0,0.3);font-family:inherit;font-size:14px;";
  el.innerHTML='<div style="font-weight:700;margin-bottom:4px;">🔔 '+title+'</div><div style="color:#ccc;">'+body+'</div>';
  document.body.appendChild(el);
  setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el);},5000);
}

function requestNotifPermission(){
  if(!("Notification" in window)){toast("Notificaciones no soportadas en este navegador","error");return;}
  if(!fcmMessaging){toast("Inicializando... intenta de nuevo en 2 segundos","error");console.warn("fcmMessaging es null");return;}
  Notification.requestPermission().then(function(perm){
    if(perm!=="granted"){toast("Permiso de notificaciones denegado","error");return;}
    fcmMessaging.getToken({vapidKey:VAPID_KEY}).then(function(token){
      if(!token){toast("No se pudo obtener token FCM","error");return;}
      if(!db)return;
      var userKey=currentUser&&currentUser.type==="boss"?"boss":"collab_"+currentUser.id;
      db.collection("fcm_tokens").doc(userKey).set({token:token,ts:Date.now()})
        .then(function(){toast("Notificaciones activadas ✓");})
        .catch(function(e){console.warn("Token save:",e);});
    }).catch(function(e){console.warn("FCM token:",e);toast("Error FCM: "+e.message,"error");});
  });
}

function sendNotif(userKey,title,body){
  if(!db)return;
  db.collection("fcm_tokens").doc(userKey).get().then(function(doc){
    if(!doc.exists)return;
    fetch("/.netlify/functions/notify",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({token:doc.data().token,title:title,body:body})
    }).catch(function(e){console.warn("notify:",e);});
  });
}

function saveCloud(){
  if(!db||!_cloudSynced)return; // no escribir hasta recibir datos de Firestore
  var fc={
    collaborators:state.collaborators.map(function(c){
      var ph=(c.photo&&!c.photo.startsWith("data:")&&!c.photo.startsWith("blob:"))?c.photo:"";
      return Object.assign({},c,{photo:ph});
    }),
    tasks:state.tasks,messages:state.messages,alerts:state.alerts,references:state.references||[],taskTemplates:state.taskTemplates||[],locations:state.locations||[]
  };
  window._pendingSave=true;
  db.collection("at").doc("data").set(fc).then(function(){
    window._pendingSave=false;
  }).catch(function(e){
    console.warn("save:",e);
    window._pendingSave=true;
  });
}
// Reintento automático cuando vuelve la red
window.addEventListener("online",function(){
  if(window._pendingSave&&db){console.log("Red recuperada, reintentando guardar...");saveCloud();}
});

function startSync(){
  if(!db)return;
  db.collection("at").doc("data").onSnapshot(function(snap){
    if(!snap.exists)return;
    var d=snap.data();
    var pm={};
    state.collaborators.forEach(function(c){if(c.photo)pm[c.id]=c.photo;});
    // Preservar status e historial local para evitar que onSnapshot sobreescriba cambios no guardados
    var localStatuses={},localHistories={};
    state.tasks.forEach(function(t){
      localStatuses[t.id]=t.status;
      localHistories[t.id]=t.history||[];
    });
    state=Object.assign({collaborators:[],tasks:[],messages:{},alerts:[],references:[],taskTemplates:[],locations:[]},d);
    state.tasks=state.tasks.map(function(t){
      var ls=localStatuses[t.id];
      var lh=localHistories[t.id]||[];
      // Preservar status si hay cambio local pendiente (completada o validación)
      if(ls&&ls!==t.status&&(ls==="completada"||t.status==="pendiente_validacion"))t.status=ls;
      // Preservar historial si el local tiene más entradas (aún no sincronizadas con Firestore)
      if(lh.length>(t.history||[]).length)t.history=lh;
      return t;
    });
    state.collaborators=state.collaborators.map(function(c){return Object.assign({},c,{photo:c.photo||pm[c.id]||""});});
    // Solo guardar en localStorage (no disparar saveCloud: acabamos de recibir datos de Firestore)
    try{localStorage.setItem(SK,JSON.stringify(state));}catch(e){}
    if(currentUser)render();
  },function(e){console.warn("sync:",e);});
}
var OT={diaria:2.4*3600000,semanal:.7*86400000,mensual:3*86400000};
var CD={diaria:86400000,semanal:7*86400000,mensual:30*86400000};
function taskDue(t){
  // Si tiene fecha fin explícita
  if(t.endDate){
    return t.endTime?new Date(t.endDate+'T'+t.endTime).getTime():new Date(t.endDate).getTime()+86399000;
  }
  // Sin fecha fin: calcular último día del ciclo actual con hora de entrega
  var now=new Date();
  var d;
  if(t.frequency==="semanal"){
    // Último día de la semana actual (domingo=0, lunes=1...; usamos domingo como fin)
    var day=now.getDay();var diff=day===0?0:7-day;
    d=new Date(now);d.setDate(now.getDate()+diff);
  }else if(t.frequency==="mensual"){
    // Último día del mes actual
    d=new Date(now.getFullYear(),now.getMonth()+1,0);
  }else{
    // Diaria (L-V): si es fin de semana, avanzar al próximo lunes
    d=new Date(now);
    var dow=d.getDay();
    if(dow===6){d.setDate(d.getDate()+2);}   // sábado → lunes
    else if(dow===0){d.setDate(d.getDate()+1);} // domingo → lunes
  }
  if(t.endTime){
    var parts=t.endTime.split(":");
    d.setHours(Number(parts[0]),Number(parts[1]),0,0);
  }else{
    d.setHours(23,59,0,0);
  }
  return d.getTime();
}
function cycleStart(t){
  var ref=t.startDate?new Date(t.startDate).getTime():taskDue(t);
  var now=Date.now();
  if(t.frequency==="mensual"){var d=new Date();return new Date(d.getFullYear(),d.getMonth(),1).getTime();}
  var dur=t.frequency==="semanal"?CD.semanal:CD.diaria;
  var n=Math.floor((now-ref)/dur);
  return ref+n*dur;
}

function saveLocal(){
  try{localStorage.setItem(SK,JSON.stringify(state));}catch(e){}
  if(db){clearTimeout(window._saveTimer);window._saveTimer=setTimeout(saveCloud,1500);}
}

function init(){
  state=loadLocal();
  document.getElementById("login-screen").classList.remove("hidden");
  setInterval(runAlerts,30000);
  setInterval(runReminders,5*60000);
  setInterval(function(){if(currentUser&&currentTab==="tareas")renderTasks();},60000);
  initFCM();
  if(db){
    var done=false;
    var t=setTimeout(function(){if(!done){done=true;_cloudSynced=true;showMainLogin();startSync();}},5000);
    db.collection("at").doc("data").get().then(function(snap){
      if(done)return;done=true;clearTimeout(t);
      if(snap.exists){
        var d=snap.data();
        var pm={};
        state.collaborators.forEach(function(c){if(c.photo)pm[c.id]=c.photo;});
        state=Object.assign({collaborators:[],tasks:[],messages:{},alerts:[]},d);
        state.collaborators=state.collaborators.map(function(c){return Object.assign({},c,{photo:c.photo||pm[c.id]||""});});
        saveLocal();
      }
      _cloudSynced=true; // a partir de aquí saveCloud puede escribir con seguridad
      showMainLogin();
      startSync();
    }).catch(function(){if(!done){done=true;_cloudSynced=true;clearTimeout(t);showMainLogin();}});
  }else{
    showMainLogin();
  }
}

function escH(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function avHTML(c,size){

  var ini=((c&&c.name)||"?").split(" ").map(function(w){return w[0];}).join("").slice(0,2).toUpperCase();
  return'<div class="av" style="width:'+size+'px;height:'+size+'px;background:'+((c&&c.color)||"#aaa")+';color:#fff;font-size:'+(size*.33)+'px;">'+ini+'</div>';
}

function compressImg(file,cb){
  var fr=new FileReader();
  fr.onload=function(e){
    var img=new Image();
    img.onload=function(){
      var MAX=220,sc=Math.min(MAX/img.width,MAX/img.height,1);
      var cv=document.createElement("canvas");
      cv.width=img.width*sc;cv.height=img.height*sc;
      cv.getContext("2d").drawImage(img,0,0,cv.width,cv.height);
      cb(cv.toDataURL("image/jpeg",.65));
    };
    img.src=e.target.result;
  };
  fr.readAsDataURL(file);
}

      if(n==='')return'<div></div>';

function updatePinDisplay(){
  var dots=document.querySelectorAll("#pin-display .pin-dot");
  dots.forEach(function(d,i){
    d.className="pin-dot"+(i<pinBuffer.length?" filled":"");
  });
}

function pinPress(val){
  var errEl=document.getElementById("pin-error");
  if(errEl)errEl.textContent="";
  if(val==="⌫"){pinBuffer=pinBuffer.slice(0,-1);updatePinDisplay();return;}
  if(pinBuffer.length>=6)return;
  pinBuffer+=val;
  updatePinDisplay();
  if(pinBuffer.length===6){
    setTimeout(function(){
      if(pinTarget==="boss"){
        if(pinBuffer===BOSS_PIN){loginBoss();}
        else{pinBuffer="";updatePinDisplay();if(errEl)errEl.textContent="PIN incorrecto";}
      }else if(pinTarget){
        var c=state.collaborators.find(function(x){return x.id===pinTarget;});
        if(c&&pinBuffer===c.pin){loginCollab(c.id);}
        else{pinBuffer="";updatePinDisplay();if(errEl)errEl.textContent="PIN incorrecto";}
      }
    },200);
  }
}

function aiNotify(ck,sys,userText){
  if(!state.messages[ck])state.messages[ck]=[];
  fetch("/.netlify/functions/claude",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:120,system:sys,messages:[{role:"user",content:userText}]})
  }).then(function(r){return r.json();}).then(function(d){
    var txt=(d.content&&d.content[0]&&d.content[0].text)||(d.error?"⚠️ "+d.error.message:"Sin respuesta.");
    state.messages[ck].push({id:Date.now(),from:"ai",text:txt,ts:Date.now()});
    saveLocal();
  }).catch(function(){});
}

function runAlerts(){
  var now=Date.now(),changed=false;
  var _dowA=new Date().getDay(); // 0=dom, 6=sab
  state.tasks.forEach(function(task){
    if(task.status==="completada"||task.indefinite||!task.endDate)return;
    // Tareas diarias sin fecha explícita no aplican fin de semana
    if((task.frequency==="diaria"||!task.frequency)&&(_dowA===0||_dowA===6))return;
    var due=taskDue(task);
    var thresh=OT[task.frequency]||OT.diaria;
    var col=state.collaborators.find(function(c){return c.id===task.assignedTo;});
    if(!col)return;
    var wid="w_"+task.id,aid="a_"+task.id,eid="e_"+task.id;
    var ck=collabCK(task.assignedTo);
    // Pre-warning: 2h before due, while not yet overdue
    if(now>=due-2*3600000&&now<due&&!state.alerts.find(function(a){return a.id===wid;})){
      state.alerts.push({id:wid,taskId:task.id,collabId:task.assignedTo,type:"pre_warn",ts:now});
      var sys="Eres el asistente de AgendaTeam. La tarea \""+task.title+"\" de "+col.name+" vence en menos de 2 horas. Pregúntale amablemente por qué aún no ha completado la tarea y pídele que confirme una nueva fecha y hora de culminación si no podrá completarla a tiempo. Responde en español, máximo 3 oraciones.";
      aiNotify(ck,sys,"Alerta pre-vencimiento de tarea.");
      changed=true;
    }
    if(now<due)return;
    var over=now-due;
    // First alert: task just overdue
    if(!state.alerts.find(function(a){return a.id===aid;})){
      if(!state.messages[ck])state.messages[ck]=[];
      state.messages[ck].push({id:Date.now()+Math.random(),from:"system",type:"alert_request",ts:now,
        text:"⚠️ Hola "+col.name.split(" ")[0]+", la tarea *\""+task.title+"\"* venció el "+task.endDate+(task.endTime?" "+task.endTime:"")+".\n\n¿Puedes confirmar una nueva fecha y hora para completarla?"});
      state.alerts.push({id:aid,taskId:task.id,collabId:task.assignedTo,type:"first",ts:now,responded:false,newDate:null});
      changed=true;
    }
    // Escalation: overdue > threshold → flag in shared channel
    var fa=state.alerts.find(function(a){return a.id===aid;});
    if(fa&&!state.alerts.find(function(a){return a.id===eid;})){
      var overThresh=over>thresh,badDate=fa.newDate&&(new Date(fa.newDate).getTime()-due)>thresh;
      if(overThresh||badDate){
        if(!state.messages[ck])state.messages[ck]=[];
        var reason=badDate?"La nueva fecha propuesta supera el margen permitido.":"Sin respuesta en el tiempo permitido.";
        state.messages[ck].push({id:Date.now()+Math.random(),from:"system",flag:true,type:"escalated",ts:now,
          text:"🚩 INCUMPLIMIENTO — \""+task.title+"\"\nColaborador: "+col.name+"\nFrecuencia: "+task.frequency+"\n"+reason+"\n\nEl jefe ha sido notificado y está en este chat."});
        state.alerts.push({id:eid,taskId:task.id,collabId:task.assignedTo,type:"escalated",ts:now});
        var sys2="Eres mediador en AgendaTeam. Hay un incumplimiento de la tarea \""+task.title+"\" asignada a "+col.name+". El jefe y el colaborador están en este mismo chat contigo. Resume la situación y pídeles que acuerden un nuevo compromiso concreto de fecha y hora. Responde en español, máximo 4 oraciones.";
        aiNotify(ck,sys2,"Inicio de mediación por incumplimiento.");
        sendNotif("boss","🚩 Incumplimiento","\""+task.title+"\" — "+col.name+" requiere atención.");
        sendNotif("collab_"+task.assignedTo,"🚩 Chat de seguimiento","El jefe ha sido agregado al chat por incumplimiento.");
        changed=true;
      }
    }
  });
  if(changed)saveLocal();
}

// ── RECORDATORIOS ESCALONADOS ──
function runReminders(){
  var now=Date.now(),changed=false;
  var today=new Date().toISOString().slice(0,10);
  var _dowR=new Date().getDay(); // 0=dom, 6=sab
  // Limpiar recordatorios de días anteriores para no acumular el array
  state.alerts=state.alerts.filter(function(a){
    if(!a.type||a.type.indexOf("rem")<0)return true;
    return a.date===today;
  });
  state.tasks.forEach(function(task){
    if(task.status==="completada"||task.status==="cancelada")return;
    // Tareas diarias no aplican fin de semana
    if((task.frequency==="diaria"||!task.frequency)&&(_dowR===0||_dowR===6))return;
    var due=taskDue(task);
    var diff=due-now;
    if(diff<=0||diff>91*60000)return; // ya venció o faltan más de 91 min
    var isGroupTask=task.isGroup&&Array.isArray(task.assignedTo);
    var assignees=isGroupTask?task.assignedTo:(task.assignedTo?[task.assignedTo]:[]);
    assignees.filter(Boolean).forEach(function(collabId){
      var col=state.collaborators.find(function(c){return c.id===collabId;});
      if(!col)return;
      var ck=isGroupTask&&task.groupKey?task.groupKey:collabCK(collabId);
      var tname="\""+task.title+"\"";
      var ttime=task.endTime?" a las "+task.endTime:"";
      // Checkpoints: {umbral en min, id, useAI, mensaje directo, texto notif}
      var cps=[
        {min:90,id:"rem90",useAI:true,notif:"⏰ 1h 30min para entregar — prepara tu soporte."},
        {min:60,id:"rem60",useAI:false,
         msg:"⏰ *Recordatorio — queda 1 hora*\n\nFalta 1 hora para presentar el soporte de *"+tname+"*"+(task.endTime?"\n🕐 Hora límite: "+task.endTime:"")+". ¡Organiza tu tiempo y ten lista tu evidencia!",
         notif:"⏰ 1 hora restante. ¡Prepara tu soporte!"},
        {min:30,id:"rem30",useAI:true,notif:"🔔 ¡30 minutos! Presenta tu soporte ahora."},
        {min:15,id:"rem15",useAI:false,
         msg:"🚨 *¡15 minutos para el cierre!*\n\nLa tarea *"+tname+"* vence en 15 minutos"+(task.endTime?" ("+task.endTime+")":"")+". Ingresa a AgendaTeam y presenta tu soporte de inmediato.",
         notif:"🚨 ¡15 minutos! Ingresa y reporta ya."},
        {min:5,id:"rem5",useAI:false,
         msg:"🔴 *¡URGENTE — 5 minutos!*\n\nEl tiempo para presentar *"+tname+"* está por agotarse. ¡Reporta AHORA antes de que cierre el ciclo!",
         notif:"🔴 ¡5 minutos! Último aviso — reporta ya."}
      ];
      cps.forEach(function(cp){
        if(diff>cp.min*60000)return; // aún no llega a este umbral
        var rid=cp.id+"_"+task.id+"_"+collabId+"_"+today;
        if(state.alerts.find(function(a){return a.id===rid;}))return; // ya enviado
        state.alerts.push({id:rid,taskId:task.id,collabId:collabId,type:cp.id,date:today,ts:now});
        if(cp.useAI){
          var urgLevel=cp.min===90?"en 1 hora y 30 minutos":"en 30 minutos";
          var tone=cp.min===90?"motivador y amable, menciona que debe organizar su tiempo":"urgente y directo, pídele que presente el soporte AHORA";
          var sys="Eres el asistente de AgendaTeam. La tarea "+tname+" de "+col.name.split(" ")[0]+" vence "+urgLevel+ttime+". Envía un recordatorio "+tone+". Máximo 2 oraciones. Responde en español.";
          aiNotify(ck,sys,"Recordatorio "+cp.min+" min antes del vencimiento.");
        }else{
          if(!state.messages[ck])state.messages[ck]=[];
          state.messages[ck].push({id:Date.now()+Math.random(),from:"ai",text:cp.msg,ts:now});
        }
        sendNotif("collab_"+collabId,"📋 AgendaTeam — "+col.name.split(" ")[0],cp.notif+" ("+task.title+")");
        changed=true;
      });
    });
  });
  if(changed){
    saveLocal();
    if(currentChatKey)renderChat();
  }
}

// ── COUNTDOWN ──
function timeCountdown(t){
  if(t.status==="completada")return"";
  // Tareas diarias sin fecha explícita no aplican fin de semana
  if(!t.endDate&&(t.frequency==="diaria"||!t.frequency)){
    var _dow=new Date().getDay();
    if(_dow===6||_dow===0){
      return'<span class="badge" style="background:#f0f7ff;color:#4a90d9;font-weight:700;">📅 Retoma el lunes</span>';
    }
  }
  var due=taskDue(t);
  var diff=due-Date.now();
  var abs=Math.abs(diff);
  var d=Math.floor(abs/86400000);
  var h=Math.floor((abs%86400000)/3600000);
  var m=Math.floor((abs%3600000)/60000);
  var str="",color="",bg="";
  if(diff<0){
    str=d>0?d+"d "+h+"h vencida":h>0?h+"h "+m+"min vencida":m+"min vencida";
    color="#e74c3c";bg="#fff0f0";
  }else if(diff<3600000){
    str=m+"min restantes";color="#e74c3c";bg="#fff0f0";
  }else if(diff<86400000){
    str=h+"h "+m+"min restantes";color="#e67e22";bg="#fff8ec";
  }else{
    str=d+"d "+h+"h restantes";color="#27ae60";bg="#eafaf1";
  }
  return'<span class="badge" style="background:'+bg+';color:'+color+';font-weight:800;">⏱ '+str+'</span>';
}

// ── TIMELINE ──
function timelineHTML(task){
  var history=task.history||[];
  var cycles=[];
  // Fill up to 20 slots
  for(var i=0;i<20;i++){
    if(i<history.length){cycles.push(history[history.length-1-i]);}
    else{cycles.push(null);}
  }
  cycles=cycles.reverse();
  var dots=cycles.map(function(h,i){
    if(!h)return'<div class="tl-dot empty" title="Sin registro"></div>';
    var col=h.result==="green"?"green":h.result==="yellow"?"yellow":"red";
    var label=h.result==="green"?"✓ A tiempo":h.result==="yellow"?"⚠ Fuera de tiempo":"✗ No cumplida";
    return'<div class="tl-dot '+col+'" title="'+label+' - '+escH(h.date||"")+'"></div>';
  }).join("");
  var legend='<span style="font-size:10px;color:#aaa;margin-left:4px;">Últimos '+Math.min(history.length,20)+' ciclos</span>';
  return'<div style="margin-top:10px;padding-top:10px;border-top:1px solid #f0f2f7;">'+
    '<div style="font-size:11px;color:#999;margin-bottom:6px;font-weight:700;">📊 Historial de cumplimiento</div>'+
    '<div style="display:flex;align-items:center;flex-wrap:wrap;gap:3px;">'+dots+legend+'</div>'+
    '<div style="display:flex;gap:12px;margin-top:6px;">'+
    '<span style="font-size:10px;color:#27ae60;font-weight:700;">🟢 A tiempo</span>'+
    '<span style="font-size:10px;color:#f5a623;font-weight:700;">🟡 Fuera de tiempo</span>'+
    '<span style="font-size:10px;color:#e74c3c;font-weight:700;">🔴 No cumplida</span>'+
    '</div></div>';
}

function updStat(id,status){
  var t=state.tasks.find(function(x){return x.id==id;});
  if(!t)return;
  var prevStatus=t.status;
  // Si el colaborador marca completada y la tarea tiene criterios → pedir reporte
  var isBoss=currentUser&&currentUser.type==="boss";
  if(status==="completada"&&!isBoss&&t.criteria&&t.criteria.trim()&&prevStatus!=="completada"){
    showCompletionReport(id);
    return;
  }
  // Cycle validation
  if(status==="completada"&&prevStatus!=="completada"){
    var cs=cycleStart(t);
    var alreadyDone=(t.history||[]).some(function(h){return h.ts>=cs;});
    if(alreadyDone){toast("Ya se registró un ciclo completado en este período","error");return;}
    if(!t.history)t.history=[];
    var now=new Date();
    var result="green";
    if(t.endDate){
      var due=taskDue(t);
      var diff=now.getTime()-due;
      if(diff>0&&diff<=OT[t.frequency||"diaria"])result="yellow";
      else if(diff>OT[t.frequency||"diaria"])result="red";
    }
    t.history.push({date:now.toLocaleDateString("es"),ts:now.getTime(),result:result});
    if(t.history.length>20)t.history=t.history.slice(-20);
  }
  t.status=status;
  saveLocal();render();toast("Estado actualizado ✓");
}

function addEvidenceFiles(files){
  Array.from(files).forEach(function(f){_evidenceFiles.push(f);_evidenceCoords.push(null);});

}
function addCameraFiles(files){
  var fileArray=Array.from(files);
  if(!fileArray.length)return;
  // Agregar archivos INMEDIATAMENTE con coords null para que la preview y el envío no queden bloqueados
  var startIdx=_evidenceFiles.length;
  fileArray.forEach(function(f){_evidenceFiles.push(f);_evidenceCoords.push(null);});
  renderEvidencePreview();
  if(navigator.geolocation){
    toast("📍 Obteniendo ubicación…");
    navigator.geolocation.getCurrentPosition(function(pos){
      var coord={lat:pos.coords.latitude,lng:pos.coords.longitude,acc:Math.round(pos.coords.accuracy)};
      // Actualizar coords de las fotos recién añadidas
      for(var i=startIdx;i<startIdx+fileArray.length;i++){_evidenceCoords[i]=Object.assign({},coord);}
      renderEvidencePreview();
      // Geocodificación inversa con Nominatim (OpenStreetMap)
      fetch("https://nominatim.openstreetmap.org/reverse?lat="+coord.lat+"&lon="+coord.lng+"&format=json&accept-language=es",{headers:{"User-Agent":"AgendaTeam/1.0"}})
        .then(function(r){return r.json();}).then(function(geo){
          if(geo&&geo.address){
            var a=geo.address;
            var parts=[a.road||a.pedestrian||a.footway||"",a.neighbourhood||a.suburb||a.quarter||a.city_district||"",a.city||a.town||a.village||a.municipality||"",a.state||"",a.country||""].filter(Boolean);
            var address=parts.slice(0,4).join(", ");
            for(var i=startIdx;i<startIdx+fileArray.length;i++){if(_evidenceCoords[i])_evidenceCoords[i].address=address;}
            renderEvidencePreview();
          }
        }).catch(function(){});
    },function(){
      toast("Ubicación no disponible — verifica permisos GPS","warn");
      // Las fotos ya están en el array con coords null, no se bloquea el envío
    },{enableHighAccuracy:true,timeout:12000,maximumAge:0});
  }
}

function submitCompletionReport(taskId){
  var report=(document.getElementById("completion-report")||{}).value||"";
  report=report.trim();
  if(!report){toast("Describe qué hiciste para completar la tarea","error");return;}
  var t=state.tasks.find(function(x){return x.id==taskId;});
  if(!t)return;
  // Validar ubicación requerida
  if(t.requireLocation){
    // Leer ubicación seleccionada por el colaborador
    var selLocEl=document.getElementById("collab-loc-select");
    var selLocId=selLocEl?selLocEl.value:"";
    var selLoc=(state.locations||[]).find(function(l){return String(l.id)===String(selLocId);});
    if(!selLocId||!selLoc){toast("⚠️ Selecciona la ubicación donde te encuentras","error");return;}
    var cameraFiles=_evidenceFiles.filter(function(_,i){return _evidenceCoords[i]&&_evidenceCoords[i].lat;});
    if(!cameraFiles.length){toast("⚠️ Esta tarea requiere al menos una foto con ubicación GPS. Usa el botón 📷 Cámara.","error");return;}
    if(t.validateProximity){
      // Validar contra la ubicación seleccionada por el colaborador
      var refLoc=selLoc;
      var allowedRadius=t.locationRef&&t.locationRef.taskRadius||t.locationRef&&t.locationRef.radius||selLoc.radius||200;
      var outOfRange=_evidenceCoords.filter(function(c){
        if(!c||!c.lat)return false;
        return haversineMeters(c.lat,c.lng,refLoc.lat,refLoc.lng)>allowedRadius;
      });
      if(outOfRange.length>0){
        var allowedR=allowedRadius;
        var dist=Math.round(haversineMeters(outOfRange[0].lat,outOfRange[0].lng,refLoc.lat,refLoc.lng));
        var locName=escH(refLoc.name||"la referencia");
        var rejMsg="📍 Soporte rechazado por ubicación fuera de rango.\n\nFoto tomada a "+dist+"m de "+locName+".\nRadio permitido: "+allowedR+"m.\nDistancia excedida: "+(dist-allowedR)+"m.\n\n🔧 Para aprobar: ubícate dentro del radio permitido antes de tomar la foto.";
        // Registrar rechazo en historial
        if(!t.history)t.history=[];
        t.history.push({date:new Date().toLocaleDateString("es"),ts:Date.now(),result:"red",approved:false,report:"[Rechazo GPS] Foto a "+dist+"m, radio "+allowedR+"m"});
        if(t.history.length>20)t.history=t.history.slice(-20);
        // Publicar en el chat del colaborador
        var col=state.collaborators.find(function(c){return Array.isArray(t.assignedTo)?t.assignedTo.indexOf(c.id)>=0:c.id===t.assignedTo;});
        var ck=t.isGroup&&t.groupKey?t.groupKey:(col?collabCK(col.id):null);
        if(ck){
          if(!state.messages[ck])state.messages[ck]=[];
          state.messages[ck].push({id:Date.now(),from:"ai",text:rejMsg,ts:Date.now()});
        }
        // Cerrar el sheet y notificar
        var sh=document.getElementById("completion-sheet");if(sh)sh.remove();
        saveLocal();if(db)saveCloud();render();
        toast("📍 Foto fuera del radio permitido ("+dist+"m de "+locName+")","error");
        return;
      }
    }
  }
  // Agregar ubicación seleccionada al reporte
  if(t.requireLocation&&selLoc){
    report+=" [📍 Ubicación: "+selLoc.name+"]";
  }
  if(_evidenceFiles.length>0){
    var prog=document.getElementById("upload-progress");
    if(prog)prog.style.display="block";
    uploadEvidence(taskId,_evidenceFiles,_evidenceCoords,
      function(pct){var p=document.getElementById("upload-progress");if(p)p.textContent="⏳ Subiendo… "+pct+"%";},
      function(urls){
        var sh=document.getElementById("completion-sheet");if(sh)sh.remove();
        _finishSubmit(taskId,report,urls);
      },
      function(err){toast("Error al subir archivos: "+err,"error");}
    );
  }else{
    var sh=document.getElementById("completion-sheet");if(sh)sh.remove();
    _finishSubmit(taskId,report,[]);
  }
}

// ── FACE & DUPLICATE VALIDATION ──
function imgHash(url){
  return new Promise(function(resolve){
    var img=new Image();
    img.crossOrigin="anonymous";
    img.onload=function(){
      try{
        var cv=document.createElement("canvas");cv.width=8;cv.height=8;
        var ctx=cv.getContext("2d");ctx.drawImage(img,0,0,8,8);
        var d=ctx.getImageData(0,0,8,8).data;
        var gray=[];
        for(var i=0;i<64;i++)gray.push(Math.round((d[i*4]*299+d[i*4+1]*587+d[i*4+2]*114)/1000));
        var avg=gray.reduce(function(a,b){return a+b;},0)/64;
        resolve(gray.map(function(v){return v>=avg?1:0;}).join(""));
      }catch(e){resolve(null);}
    };
    img.onerror=function(){resolve(null);};
    img.src=url+"?_="+(Date.now()); // evitar caché CORS
  });
}

function hammingDist(h1,h2){
  if(!h1||!h2||h1.length!==h2.length)return 64;
  var d=0;for(var i=0;i<h1.length;i++)if(h1[i]!==h2[i])d++;return d;
}

function cloudinarySmall(url){
  if(!url||url.indexOf("res.cloudinary.com")<0)return url;
  return url.replace("/upload/","/upload/w_600,h_600,c_fill,q_80/");
}
// Transformación optimizada para visión de IA: 1024px, alta calidad, sin recorte
function cloudinaryForAI(url){
  if(!url||url.indexOf("res.cloudinary.com")<0)return url;
  return url.replace("/upload/","/upload/w_1024,h_1024,c_limit,q_90,f_jpg/");
}
// Distancia en metros entre dos coords (Haversine)
function haversineMeters(lat1,lng1,lat2,lng2){
  var R=6371000,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function checkFaceIdentity(profileUrl,evidenceUrl){
  return fetch("/.netlify/functions/facematch",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({profileUrl:cloudinarySmall(profileUrl),evidenceUrl:cloudinarySmall(evidenceUrl)})
  }).then(function(r){return r.json();}).catch(function(){return{skipped:true,reason:"error_red"};});
}

async function runFaceAndDuplicateChecks(taskId,attachments){
  var t=state.tasks.find(function(x){return x.id==taskId;});
  if(!t)return{passed:true};
  var col=state.collaborators.find(function(c){
    return Array.isArray(t.assignedTo)?t.assignedTo.indexOf(c.id)>=0:c.id===t.assignedTo;
  });
  var imgs=attachments.filter(function(a){return a.type&&a.type.indexOf("image")>=0;});
  if(!imgs.length)return{passed:true};

  var newHashes=[];
  var faceResults=[];
  for(var i=0;i<imgs.length;i++){
    // 1. DUPLICADO — siempre activo
    var h=await imgHash(imgs[i].url);
    if(h){
      var allHistory=(t.history||[]);
      for(var j=0;j<allHistory.length;j++){
        var prevHashes=allHistory[j].photoHashes||[];
        for(var k=0;k<prevHashes.length;k++){
          if(hammingDist(h,prevHashes[k])<10){
            return{passed:false,reason:"duplicate",
              msg:"⚠️ Esta imagen ya fue utilizada como soporte el "+escH(allHistory[j].date||"")+". Por favor toma una foto nueva."};
          }
        }
      }
      newHashes.push(h);
    }
    // 2. RECONOCIMIENTO FACIAL — solo si la tarea lo requiere
    var validProfileUrl=col&&col.photo&&!col.photo.startsWith("data:")&&!col.photo.startsWith("blob:");
    if(t.faceRecognition&&validProfileUrl){
      var result=await checkFaceIdentity(col.photo,imgs[i].url);
      if(!result.skipped&&result.matched===false){
        return{passed:false,reason:"face_mismatch",
          msg:"❌ El rostro en la foto "+(imgs.length>1?"#"+(i+1)+" ":"")+"no corresponde al colaborador registrado (coincidencia: "+Math.round(result.confidence||0)+"%). Por favor toma una selfie válida."};
      }
      faceResults.push(result);
    }
  }
  // Construir resumen biométrico para el chat
  var bioSummary="";
  if(imgs.length>0){
    var dupLine="✅ "+imgs.length+" foto(s) verificada(s) — sin duplicados detectados.";
    var faceLine="";
    if(t.faceRecognition&&faceResults.length>0){
      var verified=faceResults.filter(function(r){return !r.skipped&&r.matched;});
      var skipped=faceResults.filter(function(r){return r.skipped;});
      if(verified.length>0){
        var avgConf=Math.round(verified.reduce(function(s,r){return s+(r.confidence||0);},0)/verified.length);
        faceLine="\n🙂 Identidad facial verificada — coincidencia promedio: "+avgConf+"%.";
      }else if(skipped.length===faceResults.length){
        faceLine="\n🙂 Verificación facial: imágenes sin rostro detectable, omitida.";
      }
    }else if(t.faceRecognition&&(!col||!col.photo)){
      faceLine="\n⚠️ Verificación facial omitida: el colaborador no tiene foto de perfil registrada.";
    }
    bioSummary=dupLine+faceLine;
  }
  return{passed:true,newHashes:newHashes,bioSummary:bioSummary};
}

async function _finishSubmit(taskId,report,attachments){
  var t=state.tasks.find(function(x){return x.id==taskId;});
  if(!t)return;
  // Verificar soportes obligatorios
  var req=t.requiredEvidence||{};
  var missing=[];
  var hasPhoto=attachments.some(function(a){return a.type&&a.type.indexOf("image")>=0;});
  var hasDoc=attachments.some(function(a){return!(a.type&&a.type.indexOf("image")>=0)&&!(a.type&&a.type.indexOf("video")>=0);});
  if(req.photo&&!hasPhoto)missing.push("📷 Foto (tomada con cámara)");
  if(req.image&&!hasPhoto)missing.push("🖼️ Imagen (desde galería)");
  if(req.document&&!hasDoc)missing.push("📄 Documento");
  if(missing.length>0){
    toast("Faltan soportes obligatorios:\n"+missing.join(", "),"error");
    showCompletionReport(taskId);return;
  }
  // Verificar duplicados y reconocimiento facial
  var hasImgs=attachments.some(function(a){return a.type&&a.type.indexOf("image")>=0;});
  if(hasImgs){
    toast("🔍 Verificando imágenes…");
    var checks=await runFaceAndDuplicateChecks(taskId,attachments);
    if(!checks.passed){
      showCompletionReport(taskId,checks.msg);return;
    }
    // Guardar hashes en el estado temporal para registrarlos al aprobar
    t._pendingHashes=checks.newHashes||[];
    t._biometricSummary=checks.bioSummary||"";
  }
  t.status="pendiente_validacion";
  t.pendingReport=report;
  t.pendingAttachments=attachments;
  saveLocal();render();
  toast("Enviado para validación IA 🤖");
  validateTaskCompletion(taskId,report,attachments);
}

function validateTaskCompletion(taskId,report,attachments){
  attachments=attachments||[];
  var t=state.tasks.find(function(x){return x.id==taskId;});
  if(!t)return;
  var col=state.collaborators.find(function(c){return Array.isArray(t.assignedTo)?t.assignedTo.indexOf(c.id)>=0:c.id===t.assignedTo;});
  var ck=t.isGroup&&t.groupKey?t.groupKey:(col?collabCK(col.id):null);
  if(!ck){t.status="en-progreso";delete t.pendingReport;delete t.pendingAttachments;saveLocal();render();toast("Error: canal de chat no encontrado","error");return;}
  var attInfo=attachments.length>0?"\nSoportes adjuntados ("+attachments.length+"): "+attachments.map(function(a){return a.name+(a.type?" ["+a.type+"]":"");}).join(", "):"\nNo se adjuntaron soportes.";
  var rawCriteria=t.criteria||"";
  var criteriaLines=rawCriteria.split(/\n/).filter(function(s){return s.trim();});
  if(criteriaLines.length<=1)criteriaLines=rawCriteria.split(/\./).filter(function(s){return s.trim();});
  // Si no hay criterios explícitos, usar las notas de la tarea como criterio base
  if(criteriaLines.length===0&&t.notes)criteriaLines=[t.notes];
  if(criteriaLines.length===0)criteriaLines=["Verificar que el reporte cumple con lo solicitado en la tarea: "+t.title];
  criteriaLines=criteriaLines.map(function(s,i){return(i+1)+". "+s.trim();}).join("\n");
  // Buscar referencias en la base de datos que coincidan con la tarea
  var refs=state.references||[];
  var criteriaLow=(rawCriteria+" "+t.title+" "+(t.notes||"")).toLowerCase();
  var allMatchedRefs=refs.filter(function(r){
    return criteriaLow.indexOf(r.name.toLowerCase())>=0||
      (r.category&&criteriaLow.indexOf(r.category.toLowerCase())>=0);
  });
  // Usar todas las referencias coincidentes (hasta 3) para mejor reconocimiento visual (EPP, etc.)
  var matchedRefs=allMatchedRefs.slice(0,3);
  var refContext="";
  var refImageBlocks=[];
  if(matchedRefs.length>0){
    refContext="\nREFERENCIAS BD ("+matchedRefs.length+"): "+matchedRefs.map(function(r){return r.name+(r.description?": "+r.description.slice(0,100):"");}).join(" | ");
    matchedRefs.forEach(function(r){
      var img=(r.imageUrls||[]).find(function(i){return i.url;});
      if(img&&refImageBlocks.length<3)refImageBlocks.push({type:"image",source:{type:"url",url:cloudinaryForAI(img.url)}});
    });
  }
  // Imágenes de los soportes enviados
  var evImageBlocks=attachments.filter(function(a){return a.type&&a.type.indexOf("image")>=0;}).slice(0,5).map(function(a){return{type:"image",source:{type:"url",url:cloudinaryForAI(a.url)}};});
  var refCount=refImageBlocks.length,evCount=evImageBlocks.length;
  var imgNote="";
  var faceNote=t.faceRecognition?" Identidad facial ya verificada, no evaluar.":" ";
  var gpsNote=t.requireLocation?" GPS ya validado, no evaluar ubicación visual.":" ";
  var imgInstr="";
  if(evCount>0&&refCount>0){
    imgInstr=" IMÁGENES: primera(s) "+refCount+" imagen(es) = REFERENCIA de BD (muestra cómo debe verse cada EPP/elemento correctamente). Siguiente(s) "+evCount+" imagen(es) = EVIDENCIA del colaborador. Compara la evidencia contra la referencia para validar cada criterio.";
  }else if(evCount>0){
    imgInstr=" Se adjuntan "+evCount+" imagen(es) de evidencia del colaborador. Evalúa CADA una por separado según el criterio que corresponda.";
  }
  var sys="Validador AgendaTeam. Tarea:\""+t.title+"\"\nCriterios:\n"+criteriaLines+"\nReporte:\""+report.slice(0,300)+"\""+
    (attachments.length?" Soportes:"+attachments.length+" archivo(s).":"")+
    imgInstr+faceNote+gpsNote+
    "\nEVALÚA CADA CRITERIO INDIVIDUALMENTE. SIEMPRE incluye todos los criterios con su resultado. Responde SOLO JSON sin texto extra:\n"+
    "{\"aprobada\":true/false,\"porcentaje\":0-100,\"razon\":\"resumen en 1 oración\","+
    "\"criteriaResults\":[{\"criterio\":\"nombre exacto del criterio\",\"cumplido\":true/false,\"detalle\":\"si cumplido: evidencia que lo confirma. Si rechazado: razón exacta del fallo y qué falta.\"}],"+
    "\"pasos\":[\"acción concreta para corregir (lista vacía si aprobada=true)\"]}"+
    "\nOBLIGATORIO: criteriaResults debe tener una entrada por CADA criterio listado, sin excepción.";
  if(!state.messages[ck])state.messages[ck]=[];
  var attMsg=attachments.length>0?"\n📎 "+attachments.length+" soporte(s) adjunto(s): "+attachments.map(function(a){return a.name;}).join(", "):"";
  if(matchedRefs.length>0)attMsg+="\n📚 "+matchedRefs.length+" referencia(s) de BD consultada(s): "+matchedRefs.map(function(r){return r.name;}).join(", ");
  // Mostrar reporte biométrico en el chat si existe
  var bioMsg=t._biometricSummary||"";
  if(bioMsg){
    state.messages[ck].push({id:Date.now()-1,from:"system",type:"biometric",ts:Date.now()-1,
      text:"🔐 Verificación biométrica:\n"+bioMsg});
  }
  state.messages[ck].push({id:Date.now(),from:"system",type:"validating",ts:Date.now(),
    text:"🤖 Validando completado de \""+t.title+"\"…"+attMsg,attachments:attachments});
  saveLocal();
  // Construir content con imágenes de referencia + soportes si existen
  var allImgBlocks=refImageBlocks.concat(evImageBlocks);
  var msgContent=allImgBlocks.length>0?allImgBlocks.concat([{type:"text",text:"Valida el reporte."}]):"Valida el reporte.";
  fetch("/.netlify/functions/claude",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1200,system:sys,messages:[{role:"user",content:msgContent}]})
  }).then(function(r){
    var ct=r.headers.get("content-type")||"";
    if(!ct.includes("json"))return r.text().then(function(){throw new Error("Servidor no disponible ("+r.status+"). Intenta de nuevo.");});
    return r.json();
  }).then(function(d){
    t=state.tasks.find(function(x){return x.id==taskId;});
    if(!t)return;
    // Manejar errores de API (rate limit, etc.)
    if(d.error){
      t.status="en-progreso";
      var em=d.error.type==="rate_limit_error"?"⏳ Límite de uso alcanzado. Espera 1 minuto e intenta de nuevo.":"⚠️ Error del servicio: "+d.error.message;
      if(state.messages[ck])state.messages[ck].push({id:Date.now(),from:"ai",text:em,ts:Date.now()});
      delete t.pendingReport;delete t.pendingAttachments;delete t._pendingHashes;
      saveLocal();if(db)saveCloud();render();return;
    }
    var raw=(d.content&&d.content[0]&&d.content[0].text)||"";
    var result={};
    if(raw){try{var m=raw.match(/\{[\s\S]*\}/);result=m?JSON.parse(m[0]):{};}catch(e){console.warn("JSON parse error:",e,raw);}}
    if(!state.messages[ck])state.messages[ck]=[];
    // Si la IA no devolvió una respuesta válida (API error, timeout, etc.)
    if(!raw||typeof result.aprobada==="undefined"){
      t.status="en-progreso";
      state.messages[ck].push({id:Date.now(),from:"ai",text:"⚠️ El servicio de validación no respondió correctamente. Intenta reportar de nuevo en 1 minuto.",ts:Date.now()});
      delete t.pendingReport;delete t.pendingAttachments;delete t._pendingHashes;
      _aiLastTs=Date.now();
      saveLocal();if(db)saveCloud();render();return;
    }
    var approved=result.aprobada===true;
    if(approved){
      var cs=cycleStart(t);
      var alreadyDone=(t.history||[]).some(function(h){return h.ts>=cs&&h.approved;});
      if(!alreadyDone){t.history=(t.history||[]).filter(function(h){return h.ts<cs||h.approved;});}
      if(!alreadyDone){
        if(!t.history)t.history=[];
        var now2=new Date();
        var res2="green";
        if(t.endDate){var due2=taskDue(t);var diff2=now2.getTime()-due2;if(diff2>0&&diff2<=OT[t.frequency||"diaria"])res2="yellow";else if(diff2>OT[t.frequency||"diaria"])res2="red";}
        t.history.push({date:now2.toLocaleDateString("es"),ts:now2.getTime(),result:res2,approved:true,report:t.pendingReport||"",attachments:attachments,photoHashes:t._pendingHashes||[],criteriaResults:result.criteriaResults||[]});
        if(t.history.length>20)t.history=t.history.slice(-20);
      }
      t.status="completada";
      var attLinks=attachments.length>0?"\n\n📎 Soportes:\n"+attachments.map(function(a){return getFileIcon(a.type,a.name)+" "+a.name;}).join("\n"):"";
      var razonOk=result.razon||result.reason||"✅ Aprobada.";
      var pctOk=typeof result.porcentaje==="number"?"📊 Cumplimiento: "+result.porcentaje+"%\n\n":"";
      var crOk=(result.criteriaResults||[]).map(function(cr){return(cr.cumplido?"✅":"❌")+" "+cr.criterio+(cr.detalle?": "+cr.detalle:"");}).join("\n");
      state.messages[ck].push({id:Date.now(),from:"ai",text:"✅ Tarea validada y aprobada.\n\n"+pctOk+razonOk+(crOk?"\n\n"+crOk:"")+attLinks,ts:Date.now(),attachments:attachments});
      sendNotif("boss","✅ Tarea aprobada","\""+t.title+"\""+(col?" — "+col.name:"")+" pasó la validación.");
    }else{
      if(!t.history)t.history=[];
      t.history.push({date:new Date().toLocaleDateString("es"),ts:Date.now(),result:"red",approved:false,report:t.pendingReport||"",criteriaResults:result.criteriaResults||[]});
      if(t.history.length>20)t.history=t.history.slice(-20);
      t.status="en-progreso";
      var razonNok=result.razon||result.reason||"Criterios no cumplidos.";
      var pctNok=typeof result.porcentaje==="number"?"📊 Cumplimiento: "+result.porcentaje+"%\n\n":"";
      var crNok=(result.criteriaResults||[]).map(function(cr){return(cr.cumplido?"✅":"❌")+" "+cr.criterio+(cr.detalle?": "+cr.detalle:"");}).join("\n");
      var pasosNok=(result.pasos||[]).filter(function(p){return p;}).map(function(p){return"• "+p;}).join("\n");
      state.messages[ck].push({id:Date.now(),from:"ai",text:"❌ Validación no aprobada.\n\n"+pctNok+razonNok+(crNok?"\n\n"+crNok:"")+(pasosNok?"\n\n🔧 Para aprobar:\n"+pasosNok:"")+"\n\n🔄 Corrige los puntos indicados y vuelve a reportar.",ts:Date.now()});
      sendNotif("boss","⚠️ Validación rechazada","\""+t.title+"\""+(col?" — "+col.name:"")+" no cumple los criterios.");
      if(col)sendNotif("collab_"+col.id,"❌ Reporte rechazado","\""+t.title+"\": "+razonNok.slice(0,80));
      // Seguimiento programado (máx 2 veces para no consumir tokens indefinidamente)
      if(!(t._followUpCount>=2)){t._followUpCount=(t._followUpCount||0)+1;setTimeout(function(){aiFollowUp(taskId);},OT[t.frequency||"diaria"]/2);}
    }
    delete t.pendingReport;delete t.pendingAttachments;delete t._pendingHashes;
    _aiLastTs=Date.now();
    saveLocal();if(db)saveCloud();render();
  }).catch(function(e){
    t=state.tasks.find(function(x){return x.id==taskId;})||t;
    t.status="en-progreso";
    if(!state.messages[ck])state.messages[ck]=[];
    state.messages[ck].push({id:Date.now(),from:"ai",text:"⚠️ Error al validar: "+(e&&e.message||"Sin conexión")+". Intenta reportar de nuevo.",ts:Date.now()});
    delete t.pendingReport;delete t.pendingAttachments;delete t._pendingHashes;
    _aiLastTs=Date.now();
    saveLocal();if(db)saveCloud();render();
  });
}

function aiFollowUp(taskId){
  var t=state.tasks.find(function(x){return x.id==taskId;});
  if(!t||t.status==="completada")return;
  var col=state.collaborators.find(function(c){return Array.isArray(t.assignedTo)?t.assignedTo.indexOf(c.id)>=0:c.id===t.assignedTo;});
  var ck=t.isGroup&&t.groupKey?t.groupKey:(col?collabCK(col.id):null);
  if(!ck)return;
  var ov=!t.indefinite&&t.endDate&&taskDue(t)<Date.now();
  if(ov){
    // Incumplimiento inevitable → notificar a Manuel
    state.messages[ck].push({id:Date.now(),from:"system",flag:true,ts:Date.now(),
      text:"🚩 La tarea \""+t.title+"\" presenta un incumplimiento inevitable. Se ha notificado a Manuel para que dicte medidas correctivas o de sanción."});
    sendNotif("boss","🚩 Incumplimiento inevitable","\""+t.title+"\""+(col?" — "+col.name:"")+" requiere tu decisión sobre medidas correctivas.");
    // Pedir a Manuel que dicte medidas en el chat
    var sys3="Eres el asistente de AgendaTeam. La tarea \""+t.title+"\" asignada a "+(col?col.name:"el colaborador")+" no se pudo completar a tiempo y no cumple los criterios de validación. Notifica a Manuel que debe dictar medidas correctivas o de sanción, y pídele que las especifique en este chat. Sé directo y profesional. Máximo 3 oraciones.";
    aiNotify(ck,sys3,"Incumplimiento inevitable — solicitar medidas a Manuel.");
  }else{
    var sys4="Eres el asistente de seguimiento de AgendaTeam. La tarea \""+t.title+"\" de "+(col?col.name:"el colaborador")+" fue rechazada en validación y aún no está completa. Pregunta por el avance, recuérdales los criterios pendientes y presiona para que se tome acción inmediata. Máximo 3 oraciones. En español.";
    aiNotify(ck,sys4,"Seguimiento de tarea rechazada.");
    if(col)sendNotif("collab_"+col.id,"🔔 Seguimiento pendiente","\""+t.title+"\": aún requiere tu atención.");
    setTimeout(function(){aiFollowUp(taskId);},OT[t.frequency||"diaria"]/2);
  }
  saveLocal();
}

function saveRef(){
  var name=(document.getElementById("rf-name")||{}).value||"";
  var cat=(document.getElementById("rf-cat")||{}).value||"";
  var desc=(document.getElementById("rf-desc")||{}).value||"";
  name=name.trim();
  if(!name){toast("El nombre es obligatorio","error");return;}
  var prog=document.getElementById("ref-upload-progress");
  function finish(newUrls){
    var allImgs=_existingRefImgs.concat(newUrls);
    if(_editingRefId){
      var r=(state.references||[]).find(function(x){return x.id==_editingRefId;});
      if(r){Object.assign(r,{name:name,category:cat,description:desc,imageUrls:allImgs});}
    }else{
      if(!state.references)state.references=[];
      state.references.push({id:Date.now(),name:name,category:cat,description:desc,imageUrls:allImgs});
    }
    saveLocal();render();closeSheet();toast("Artículo guardado ✓");
  }
  if(_refFiles.length>0){
    if(prog)prog.style.display="block";
    var done=[],total=_refFiles.length;
    _refFiles.forEach(function(f,idx){
      var fd=new FormData();
      fd.append("file",f);fd.append("upload_preset",CLOUDINARY_PRESET);fd.append("folder","agendateam_refs");
      var xhr=new XMLHttpRequest();
      xhr.open("POST","https://api.cloudinary.com/v1_1/"+CLOUDINARY_CLOUD+"/image/upload");
      xhr.onload=function(){
        try{var r2=JSON.parse(xhr.responseText);done.push({url:r2.secure_url,name:f.name,type:f.type});}catch(e){done.push({url:"",name:f.name,type:f.type});}
        if(done.length===total)finish(done);
      };
      xhr.onerror=function(){done.push({url:"",name:f.name,type:f.type});if(done.length===total)finish(done);};
      xhr.send(fd);
    });
  }else{finish([]);}
}

function delRef(id){

  state.references=(state.references||[]).filter(function(r){return r.id!=id;});

}

function saveLocation(existingId){
  var name=((document.getElementById("lf-name")||{}).value||"").trim();
  if(!name){toast("Escribe el nombre","error");return;}
  var lat=parseFloat((document.getElementById("lf-lat")||{}).value);
  var lng=parseFloat((document.getElementById("lf-lng")||{}).value);
  if(isNaN(lat)||isNaN(lng)){toast("Ingresa coordenadas válidas","error");return;}
  var radius=parseInt((document.getElementById("lf-radius")||{}).value)||200;
  var type=window._lfType||"bodega";
  if(!state.locations)state.locations=[];
  if(existingId){
    var loc=state.locations.find(function(l){return l.id==existingId;});
    if(loc)Object.assign(loc,{name:name,type:type,lat:lat,lng:lng,radius:radius});
    toast("Ubicación actualizada ✓");
  }else{
    state.locations.push({id:Date.now(),name:name,type:type,lat:lat,lng:lng,radius:radius});
    toast("Ubicación guardada ✓");
  }
  saveLocal();if(db)saveCloud();openLocationsManager();
}
function deleteLocation(id){
  state.locations=(state.locations||[]).filter(function(l){return l.id!=id;});
  saveLocal();if(db)saveCloud();openLocationsManager();
}

function confirmAssignTemplate(templateId){
  var tmpl=(state.taskTemplates||[]).find(function(x){return x.id==templateId;});
  if(!tmpl){toast("Plantilla no encontrada","error");return;}
  var members=getSelectedMembers();
  if(!members.length){toast("Selecciona al menos un colaborador","error");return;}
  // Leer ubicación si la plantilla la requiere
  var assignedLocationRef=tmpl.locationRef||null;
  if(tmpl.validateProximity){
    var selLocId=(document.getElementById("assign-loc-select")||{}).value||"";
    var selLoc=(state.locations||[]).find(function(l){return String(l.id)===String(selLocId);});
    if(!selLoc){toast("Selecciona una ubicación de referencia","error");return;}
    var taskRadius=parseInt((document.getElementById("assign-radius")||{}).value)||selLoc.radius||200;
    assignedLocationRef={locationId:selLoc.id,name:selLoc.name,type:selLoc.type,lat:selLoc.lat,lng:selLoc.lng,radius:selLoc.radius,taskRadius:taskRadius};
  }
  var isGroup=members.length>1&&_tfMode==="grupal";
  var today=new Date().toISOString().split("T")[0];
  if(isGroup){
    var taskId=Date.now();var groupKey="group_"+taskId;
    var cols=members.map(function(id){return state.collaborators.find(function(c){return c.id===id;});}).filter(Boolean);
    var names=cols.map(function(c){return c.name.split(" ")[0];}).join(", ");
    var nt=Object.assign({},tmpl,{id:taskId,history:[],assignedTo:members,isGroup:true,groupKey:groupKey,status:"pendiente",startDate:today,locationRef:assignedLocationRef});
    state.tasks.push(nt);
    if(!state.messages[groupKey])state.messages[groupKey]=[];
    state.messages[groupKey].push({id:taskId+1,from:"system",type:"task_assigned",ts:Date.now(),
      text:"👥 Tarea grupal asignada:\n\n*\""+tmpl.title+"\"*\nFrecuencia: "+FC[tmpl.frequency||"diaria"].l+"\nPrioridad: "+PC[tmpl.priority||"media"].l+(tmpl.notes?"\nNotas: "+tmpl.notes:"")+"\n\nParticipantes: "+names});
    members.forEach(function(id){sendNotif("collab_"+id,"👥 Nueva tarea grupal","\""+tmpl.title+"\" — con "+names);});
    toast("Tarea grupal asignada ✓");
  }else{
    members.forEach(function(assignedTo,i){
      var col=state.collaborators.find(function(c){return c.id===assignedTo;});
      var nt=Object.assign({},tmpl,{id:Date.now()+i,history:[],assignedTo:assignedTo,isGroup:false,status:"pendiente",startDate:today,locationRef:assignedLocationRef});
      delete nt.groupKey;
      state.tasks.push(nt);
      if(col){
        var ck=collabCK(assignedTo);
        if(!state.messages[ck])state.messages[ck]=[];
        state.messages[ck].push({id:Date.now()+i+0.5,from:"system",type:"task_assigned",ts:Date.now(),
          text:"📋 Hola "+col.name.split(" ")[0]+", se te asignó la tarea:\n\n*\""+tmpl.title+"\"*\nFrecuencia: "+FC[tmpl.frequency||"diaria"].l+"\nPrioridad: "+PC[tmpl.priority||"media"].l+(tmpl.notes?"\nNotas: "+tmpl.notes:"")});
        sendNotif("collab_"+assignedTo,"📋 Tarea asignada","\""+tmpl.title+"\" — "+FC[tmpl.frequency||"diaria"].l);
      }
    });
    toast(members.length>1?members.length+" tareas asignadas ✓":"Tarea asignada ✓");
  }
  saveLocal();if(db)saveCloud();closeSheet();render();
}

    if(selLoc){

      locationRef={locationId:selLoc.id,name:selLoc.name,type:selLoc.type,lat:selLoc.lat,lng:selLoc.lng,radius:selLoc.radius,taskRadius:taskRadius};
    }
  }

  if(editingTaskId){
    var t=state.tasks.find(function(x){return x.id==editingTaskId;});
    if(t)Object.assign(t,{title:title,frequency:freq,priority:prio,status:stat,startDate:sd,time:ti,endDate:ed,endTime:et,indefinite:indef,notes:notes,criteria:criteria,requiredEvidence:requiredEvidence,faceRecognition:faceRecognition,requireLocation:requireLocation,validateProximity:validateProximity,locationRef:locationRef||null});

  }else if(isGroup){
    // Tarea grupal: una sola tarea con todos los miembros y chat grupal

    var groupKey="group_"+taskId;
    var cols=members.map(function(id){return state.collaborators.find(function(c){return c.id===id;});}).filter(Boolean);
    var names=cols.map(function(c){return c.name.split(" ")[0];}).join(", ");
    var nt={id:taskId,history:[],title:title,assignedTo:members,isGroup:true,groupKey:groupKey,
      frequency:freq,priority:prio,status:stat,startDate:sd,time:ti,endDate:ed,endTime:et,indefinite:indef,notes:notes,criteria:criteria,requiredEvidence:requiredEvidence,faceRecognition:faceRecognition,requireLocation:requireLocation,validateProximity:validateProximity,locationRef:locationRef||null};
    state.tasks.push(nt);
    if(!state.messages[groupKey])state.messages[groupKey]=[];
    state.messages[groupKey].push({id:taskId+1,from:"system",type:"task_assigned",ts:Date.now(),
      text:"👥 Tarea grupal asignada:\n\n*\""+title+"\"*\nFrecuencia: "+FC[freq].l+"\nPrioridad: "+PC[prio].l+(ti?"\n🕐 Hora: "+ti:"")+(sd?"\n📅 Inicio: "+sd:"")+(indef?"\n♾️ Sin fecha fin":(ed?"\n⏰ Fin: "+ed+(et?" "+et:""):""))+(notes?"\nNotas: "+notes:"")+"\n\nParticipantes: "+names+"\n\nEste chat es compartido con todo el grupo."});
    members.forEach(function(id){sendNotif("collab_"+id,"👥 Tarea grupal asignada","\""+title+"\" — con "+names);});
    toast("Tarea grupal creada ✓");
  }else{
    // Tareas individuales: una por cada miembro
    members.forEach(function(assignedTo,i){
      var col=state.collaborators.find(function(c){return c.id===assignedTo;});
      var nt={id:Date.now()+i,history:[],title:title,assignedTo:assignedTo,isGroup:false,
        frequency:freq,priority:prio,status:stat,startDate:sd,time:ti,endDate:ed,endTime:et,indefinite:indef,notes:notes,criteria:criteria,requiredEvidence:requiredEvidence,faceRecognition:faceRecognition,requireLocation:requireLocation,validateProximity:validateProximity,locationRef:locationRef||null};
      state.tasks.push(nt);
      if(col){
        var ck=collabCK(assignedTo);
        if(!state.messages[ck])state.messages[ck]=[];
        state.messages[ck].push({id:Date.now()+i+0.5,from:"system",type:"task_assigned",ts:Date.now(),
          text:"📋 Hola "+col.name.split(" ")[0]+", se te asignó una nueva tarea:\n\n*\""+title+"\"*\nFrecuencia: "+FC[freq].l+"\nPrioridad: "+PC[prio].l+(ti?"\n🕐 Hora: "+ti:"")+(sd?"\n📅 Inicio: "+sd:"")+(indef?"\n♾️ Sin fecha fin":(ed?"\n⏰ Fin: "+ed+(et?" "+et:""):""))+(notes?"\nNotas: "+notes:"")});
        sendNotif("collab_"+assignedTo,"📋 Nueva tarea asignada","\""+title+"\" — "+FC[freq].l);
      }
    });
    toast(members.length>1?members.length+" tareas individuales creadas ✓":"Tarea creada ✓");
  }
  saveLocal();closeSheet();render();
}

function handlePhoto(input){
  var f=input.files[0];if(!f)return;
  var p=document.getElementById("photo-preview");
  var btn=document.querySelector(".sheet-body .btn-dark");
  if(p)p.innerHTML='<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:28px;">⏳</div>';
  if(btn){btn.disabled=true;btn.textContent="Subiendo foto…";}
  var fd=new FormData();
  fd.append("file",f);fd.append("upload_preset",CLOUDINARY_PRESET);fd.append("folder","agendateam_avatars");
  var xhr=new XMLHttpRequest();
  xhr.open("POST","https://api.cloudinary.com/v1_1/"+CLOUDINARY_CLOUD+"/image/upload");
  xhr.onload=function(){
    try{
      var r=JSON.parse(xhr.responseText);
      if(r.secure_url){
        tempPhoto=r.secure_url;
        if(p)p.innerHTML='<img src="'+tempPhoto+'">';
      }else{
        toast("Error al subir foto: "+(r.error&&r.error.message||"respuesta inválida"),"error");
        if(p)p.innerHTML='<span>👤</span>';
      }
    }catch(e){toast("Error al subir foto","error");if(p)p.innerHTML='<span>👤</span>';}
    if(btn){btn.disabled=false;btn.textContent="Guardar";}
  };
  xhr.onerror=function(){
    toast("Error de red al subir foto","error");
    if(p)p.innerHTML='<span>👤</span>';
    if(btn){btn.disabled=false;btn.textContent="Guardar";}
  };
  xhr.send(fd);
}

function openCriteriaReport(){
  var tasks=state.tasks.filter(function(t){return t.criteria&&t.criteria.trim()&&t.history&&t.history.some(function(h){return h.criteriaResults&&h.criteriaResults.length;});});
  if(!tasks.length){toast("No hay validaciones con datos estructurados aún. Los reportes se generan a partir de las próximas validaciones.","error");return;}
  var today=new Date().toLocaleDateString("es");
  var dates=[...new Set(state.tasks.flatMap(function(t){return(t.history||[]).filter(function(h){return h.criteriaResults&&h.criteriaResults.length;}).map(function(h){return h.date;});}).filter(Boolean))].sort().reverse();
  if(!dates.length){toast("No hay datos de reportes aún","error");return;}
  var dateOpts=dates.map(function(d){return'<option value="'+escH(d)+'"'+(d===today?' selected':'')+'>'+escH(d)+'</option>';}).join("");
  var taskOpts=tasks.map(function(t){return'<option value="'+t.id+'">'+escH(t.title)+'</option>';}).join("");
  showSheet("📊 Reporte por Criterios",
    '<div class="field"><label>Fecha</label><select id="rep-date" style="width:100%;padding:10px;border-radius:10px;border:1.5px solid #e5e7ef;font-size:14px;outline:none;background:#fff;">'+dateOpts+'</select></div>'+
    '<div class="field"><label>Tarea</label><select id="rep-task" style="width:100%;padding:10px;border-radius:10px;border:1.5px solid #e5e7ef;font-size:14px;outline:none;background:#fff;">'+taskOpts+'</select></div>'+
    '<button class="btn btn-dark btn-block" style="margin-top:8px;" onclick="generateCriteriaReport()">📊 Generar reporte</button>'+
    '<div id="rep-result" style="margin-top:16px;"></div>');
}

function generateCriteriaReport(){
  var date=(document.getElementById("rep-date")||{}).value||"";
  var taskId=(document.getElementById("rep-task")||{}).value||"";
  var task=state.tasks.find(function(t){return String(t.id)===String(taskId);});
  if(!task||!date){toast("Selecciona fecha y tarea","error");return;}

  // Recolectar todos los colaboradores asignados a esta tarea (o grupo)
  var collabs=[];
  if(task.isGroup&&Array.isArray(task.assignedTo)){
    collabs=task.assignedTo.map(function(id){return state.collaborators.find(function(c){return c.id===id;});}).filter(Boolean);
  } else {
    // Buscar todas las instancias de tareas con el mismo título en esa fecha
    var sameTasks=state.tasks.filter(function(t){return t.title===task.title&&t.criteria===task.criteria;});
    sameTasks.forEach(function(t){
      var col=state.collaborators.find(function(c){return c.id===t.assignedTo||c.id===String(t.assignedTo);});
      if(col&&!collabs.find(function(x){return x.id===col.id;}))collabs.push(col);
    });
  }

  // Obtener criterios de la tarea
  var criteriaLines=task.criteria.split(/\n/).filter(function(s){return s.trim();});
  if(criteriaLines.length<=1)criteriaLines=task.criteria.split(/\./).filter(function(s){return s.trim();});
  criteriaLines=criteriaLines.map(function(s){return s.replace(/^\d+[\.\-\)]\s*/,"").trim();}).filter(Boolean);

  // Para cada colaborador, obtener el historial del día — priorizar aprobado, sino último
  function getBestEntry(t,d){
    var dayEntries=(t.history||[]).filter(function(h){return h.date===d&&h.criteriaResults&&h.criteriaResults.length;});
    if(!dayEntries.length)return null;
    var approved=dayEntries.filter(function(h){return h.approved;});
    if(approved.length)return approved[approved.length-1]; // último aprobado del ciclo
    return dayEntries[dayEntries.length-1]; // último intento si ninguno aprobado
  }

  // Construir tabla
  var theadCols=criteriaLines.map(function(c,i){return'<th style="min-width:90px;padding:8px 6px;font-size:11px;font-weight:700;background:#1a1d2e;color:#fff;text-align:center;border:1px solid #333;max-width:120px;white-space:normal;line-height:1.3;">'+(i+1)+'. '+escH(c.length>40?c.slice(0,40)+'…':c)+'</th>';}).join("");
  var rows="";
  var allTasks=task.isGroup?[task]:state.tasks.filter(function(t){return t.title===task.title&&t.criteria===task.criteria;});

  collabs.forEach(function(col){
    var colTask=task.isGroup?task:allTasks.find(function(t){return t.assignedTo===col.id||String(t.assignedTo)===String(col.id);});
    if(!colTask)return;
    var entry=getBestEntry(colTask,date);
    var statusBadge=entry?(entry.approved?'<span style="color:#27ae60;font-weight:700;font-size:10px;">✅ APROBADO</span>':'<span style="color:#e74c3c;font-weight:700;font-size:10px;">❌ NO APROBADO</span>'):'<span style="color:#bbb;font-size:10px;">Sin reporte</span>';
    var cols=criteriaLines.map(function(c,i){
      if(!entry)return'<td style="text-align:center;background:#f8f8f8;border:1px solid #eee;padding:6px;">—</td>';
      var cr=entry.criteriaResults&&entry.criteriaResults[i];
      var cumplido=cr?cr.cumplido:null;
      if(cumplido===true)return'<td style="text-align:center;background:#f0fff4;border:1px solid #ddd;padding:6px;font-size:16px;">✓</td>';
      if(cumplido===false)return'<td style="text-align:center;background:#fff0f0;border:1px solid #ddd;padding:6px;font-size:16px;font-weight:900;color:#e74c3c;">✗</td>';
      return'<td style="text-align:center;background:#f8f8f8;border:1px solid #eee;padding:6px;">—</td>';
    }).join("");
    rows+='<tr><td style="padding:8px 10px;font-weight:700;font-size:12px;white-space:nowrap;border:1px solid #eee;background:#fafafa;">'+escH(col.name)+'<br>'+statusBadge+'</td>'+cols+'</tr>';
  });

  if(!rows){document.getElementById("rep-result").innerHTML='<div style="text-align:center;color:#bbb;padding:20px;">Sin datos para esta fecha y tarea.</div>';return;}

  var html='<div style="font-weight:800;font-size:14px;margin-bottom:10px;">📊 '+escH(task.title)+' — '+escH(date)+'</div>'+
    '<div style="overflow-x:auto;border-radius:10px;border:1px solid #eee;">'+
    '<table style="width:100%;border-collapse:collapse;font-size:12px;">'+
    '<thead><tr><th style="padding:8px 10px;background:#1a1d2e;color:#fff;text-align:left;border:1px solid #333;white-space:nowrap;">Colaborador</th>'+theadCols+'</tr></thead>'+
    '<tbody>'+rows+'</tbody></table></div>';
  document.getElementById("rep-result").innerHTML=html;
}

function xlStep1(){
  return'<div style="background:#f0f7ff;border:1.5px solid #d0e8ff;border-radius:14px;padding:16px;margin-bottom:20px;">'+
    '<div style="font-weight:700;font-size:14px;margin-bottom:8px;">📋 Formato:</div>'+
    '<div style="font-size:13px;color:#555;line-height:1.8;"><b>Col A:</b> Nombre | <b>Col B:</b> Cargo | <b>Col C:</b> Teléfono | <b>Col D:</b> Correo</div>'+

    '<input type="file" accept=".xlsx,.xls" onchange="handleXL(this)" style="display:none;"></label>';
}
function handleXL(input){
  var f=input.files[0];if(!f)return;
  var fr=new FileReader();
  fr.onload=function(e){
    try{
      var wb=XLSX.read(new Uint8Array(e.target.result),{type:"array"});
      var ws=wb.Sheets[wb.SheetNames[0]];
      var data=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
      var start=(data[0]&&typeof data[0][0]==="string"&&data[0][0].toLowerCase().includes("nombre"))?1:0;
      xlRows=data.slice(start).filter(function(r){return r[0]||r[1];}).map(function(r,i){
        return{id:i,name:String(r[0]||"").trim(),role:String(r[1]||"").trim(),phone:String(r[2]||"").trim(),email:String(r[3]||"").trim(),photo:"",color:CL[i%CL.length],
          pin:(Math.floor(100000+Math.random()*900000)).toString()};
      }).filter(function(r){return r.name;});
      updateSheetBody(xlStep2());
    }catch(err){alert("Error al leer el archivo.");}
  };
  fr.readAsArrayBuffer(f);
}
function xlStep2(){

function sendMsg(){
  if(aiLoading)return;
  var _now=Date.now();if(_now-_aiLastTs<8000){toast("⏳ Espera un momento antes de enviar otro mensaje…","error");return;}
  var inp=document.getElementById("chat-in");
  if(!inp||!inp.value.trim())return;
  var isBoss=currentUser&&currentUser.type==="boss";
  var text=inp.value.trim();inp.value="";
  var isGroupChat=currentChatKey&&currentChatKey.indexOf("group_")===0;

  if(isGroupChat){
    var ck=currentChatKey;
    var taskId=Number(ck.replace("group_",""));
    var gt=state.tasks.find(function(x){return x.id===taskId;});
    var gcols=gt&&Array.isArray(gt.assignedTo)?gt.assignedTo.map(function(id){return state.collaborators.find(function(c){return c.id===id;});}).filter(Boolean):[];
    var senderName=isBoss?"Manuel":(currentUser.name||"Colaborador");
    if(!state.messages[ck])state.messages[ck]=[];
    state.messages[ck].push({id:Date.now(),from:isBoss?"boss":currentUser.id,text:text,ts:Date.now()});
    gcols.forEach(function(c){if(!isBoss||c.id!==currentUser.id)sendNotif("collab_"+c.id,"👥 "+senderName+" (grupo)","\""+gt.title+"\": "+text.slice(0,60));});
    if(!isBoss)sendNotif("boss","👥 "+senderName+" (grupo)","\""+gt.title+"\": "+text.slice(0,60));
